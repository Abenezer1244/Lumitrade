version: "3.9"

services:
  lumitrade-engine:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./logs/engine:/var/log/lumitrade
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  lumitrade-dashboard:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      lumitrade-engine:
        condition: service_healthy
    restart: unless-stopped

volumes:
  logs:
