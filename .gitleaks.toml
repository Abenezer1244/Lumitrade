# Gitleaks configuration — suppress known false positives.
#
# Spec docs, .env.example, CLAUDE.md, plan docs, and test files contain EXAMPLE
# / FAKE key patterns (not real secrets). Those paths are allowlisted below.
#
# IMPORTANT: allowlisting MUST live under [allowlist].paths. A [[rules]] block
# with a `path` does the OPPOSITE — with useDefault=true it ADDS a detection
# rule that FLAGS those paths as findings. The previous config expressed these
# as [[rules]], so every changed test file failed the scan (the diff-scoped scan
# only surfaced it when a PR touched test files). Fixed by using [allowlist].

[extend]
# Use gitleaks' default detection rules.
useDefault = true

[allowlist]
  description = "Global allowlist for documentation, examples, and test fixtures"
  paths = [
    '''docs/specs/.*''',
    '''docs/superpowers/.*''',
    '''\.env\.example''',
    '''CLAUDE\.md''',
    '''(^|/)tests/.*''',
    '''backend/tests/.*''',
  ]
