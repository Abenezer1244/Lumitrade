name: Deploy to Railway

on:
  workflow_run:
    workflows: ["Test Suite"]
    branches: [main]
    types: [completed]

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend service
        run: railway up --detach --service lumitrade-engine
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for backend health check
        run: |
          echo "Waiting 90s for backend deployment..."
          sleep 90
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" \
            ${{ vars.BACKEND_HEALTH_URL || 'https://lumitrade-engine-production.up.railway.app/health' }} || echo "000")
          if [ "$HEALTH" != "200" ]; then
            echo "Backend health check failed: $HEALTH"
            exit 1
          fi
          echo "Backend deployment healthy."

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend service
        run: railway up --detach --service lumitrade-dashboard
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for frontend health check
        run: |
          echo "Waiting 90s for frontend deployment..."
          sleep 90
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" \
            ${{ vars.FRONTEND_URL || 'https://lumitrade-dashboard-production-0507.up.railway.app' }} || echo "000")
          if [ "$HEALTH" != "200" ]; then
            echo "Frontend health check failed: $HEALTH"
            exit 1
          fi
          echo "Frontend deployment healthy."
