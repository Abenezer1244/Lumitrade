name: Codex Adversarial Review

# Runs Codex adversarial review on every PR targeting main.
#
# Behavior:
#   - Always posts findings as a PR comment.
#   - Soft-fails (advisory) by default — review is informational.
#   - Hard-fails (blocks merge) ONLY when the diff touches real-money paths:
#       backend/lumitrade/risk_engine/
#       backend/lumitrade/execution_engine/
#       backend/lumitrade/state/
#     For these, any line starting with "CRITICAL:" or "HIGH:" in the
#     review output marks the check failed.
#
# Required repo secret:
#   OPENAI_API_KEY  (used by @openai/codex CLI in non-interactive mode)
#
# Manual trigger: gh workflow run codex-adversarial-review.yml -f pr=<num>

on:
  pull_request:
    # No paths filter: this check is required by branch protection on main,
    # so the workflow MUST trigger for every PR or merging gets dead-locked.
    # The job itself short-circuits when no relevant files changed.
    branches: [main]
  workflow_dispatch:
    inputs:
      pr:
        description: 'PR number to review'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: codex-review-${{ github.event.pull_request.number || github.event.inputs.pr }}
  cancel-in-progress: true

jobs:
  adversarial-review:
    name: Codex adversarial review
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        run: npm install -g @openai/codex@latest

      - name: Compute diff against base
        id: diff
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          git diff "$BASE_SHA"..."$HEAD_SHA" > /tmp/pr.diff
          DIFF_BYTES=$(wc -c < /tmp/pr.diff)
          echo "diff_bytes=$DIFF_BYTES" >> $GITHUB_OUTPUT

          CHANGED=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA")

          # Reviewable scope: backend code, frontend code, or workflow changes.
          # Anything else (docs, planning files, .claude/, etc.) is skipped to
          # save Codex API spend without dead-locking branch protection.
          REVIEWABLE=0
          if echo "$CHANGED" | grep -E '^(backend|frontend|\.github/workflows)/' > /dev/null; then
            REVIEWABLE=1
          fi
          echo "reviewable=$REVIEWABLE" >> $GITHUB_OUTPUT

          # Real-money path touches → blocking severity
          SENSITIVE=0
          if echo "$CHANGED" | grep -E '^backend/lumitrade/(risk_engine|execution_engine|state)/' > /dev/null; then
            SENSITIVE=1
          fi
          echo "sensitive=$SENSITIVE" >> $GITHUB_OUTPUT
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Skip Codex when no reviewable files changed
        if: steps.diff.outputs.reviewable != '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number || github.event.inputs.pr }}
        run: |
          gh pr comment "$PR_NUM" --repo ${{ github.repository }} --body \
            "Codex adversarial review skipped — no backend/, frontend/, or .github/workflows/ files changed. Check passes by default."
          echo "::notice::No reviewable files in diff. Skipping Codex review."
          exit 0

      - name: Run Codex adversarial review
        id: review
        if: steps.diff.outputs.reviewable == '1'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PROMPT=$(cat <<'EOF'
          You are running an ADVERSARIAL review on the diff below. This is a
          challenge review: question the chosen implementation, design choices,
          tradeoffs, and assumptions — not just a stricter pass over defects.

          Project context: Lumitrade is a production forex trading SaaS that
          executes real trades with real capital. The code paths in
          backend/lumitrade/risk_engine/, execution_engine/, and state/ are
          life-or-death for user funds.

          Review focus:
          1. Where is the design wrong, not just buggy?
          2. What assumptions does this depend on, and what breaks if they fail?
          3. What real-world conditions (network failure, broker outage, race
             condition, partial fill, duplicate order, clock drift) could this
             mishandle?
          4. Concurrency, idempotency, and recovery — is state safe across
             crashes and restarts?
          5. Money-handling: Decimal vs float, rounding, signed vs unsigned,
             pip math.

          Output format — one finding per line, prefixed with severity:
            CRITICAL: <file:line> — <issue>
            HIGH:     <file:line> — <issue>
            MEDIUM:   <file:line> — <issue>
            LOW:      <file:line> — <issue>
          Then a short "Design challenges:" section with 1-3 questions about
          the chosen approach.

          Diff:
          EOF
          )
          {
            echo "$PROMPT"
            echo ""
            cat /tmp/pr.diff
          } > /tmp/codex-input.txt

          codex exec --skip-git-repo-check < /tmp/codex-input.txt > /tmp/review.md 2>&1 || true

          # Detect blocking findings only when sensitive paths are touched
          BLOCK=0
          if [ "${{ steps.diff.outputs.sensitive }}" = "1" ]; then
            if grep -E '^(CRITICAL|HIGH):' /tmp/review.md > /dev/null; then
              BLOCK=1
            fi
          fi
          echo "block=$BLOCK" >> $GITHUB_OUTPUT

      - name: Post review as PR comment
        if: steps.diff.outputs.reviewable == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number || github.event.inputs.pr }}
        run: |
          SCOPE_NOTE="Advisory — does not block merge."
          if [ "${{ steps.diff.outputs.sensitive }}" = "1" ]; then
            SCOPE_NOTE="**Required check** — touches real-money paths (risk/execution/state). CRITICAL or HIGH findings block merge."
          fi
          {
            echo "## Codex Adversarial Review"
            echo ""
            echo "$SCOPE_NOTE"
            echo ""
            echo "<details><summary>Review output</summary>"
            echo ""
            echo '```'
            cat /tmp/review.md
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "---"
            echo "Generated by .github/workflows/codex-adversarial-review.yml"
          } > /tmp/comment.md
          gh pr comment "$PR_NUM" --body-file /tmp/comment.md --repo ${{ github.repository }}

      - name: Fail check if blocking findings on sensitive paths
        if: steps.review.outputs.block == '1'
        run: |
          echo "::error::Codex adversarial review found CRITICAL/HIGH issues in real-money code paths (risk_engine, execution_engine, or state). See PR comment."
          exit 1
