name: Quarterly Backtest

# Runs the full backtest_v2 battery (walk-forward + ablation + Monte Carlo)
# every 3 months on the 1st at 14:00 UTC (just after the daily trading
# window closes), refreshes 2 years of OANDA data, opens a PR with the
# report, and labels CRITICAL if the live thresholds (PF >= 1.5, Sharpe
# >= 1.0, MAR >= 0.5) regress.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   OANDA_API_KEY_TRADING  — the live OANDA REST token
#   OANDA_ACCOUNT_ID       — for fetch script context
#
# To run manually: gh workflow run quarterly-backtest.yml

on:
  schedule:
    # 14:00 UTC on the 1st of Jan, Apr, Jul, Oct
    - cron: '0 14 1 1,4,7,10 *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  backtest:
    name: Run quarterly backtest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Fetch fresh 2-year OANDA data
        working-directory: backend
        env:
          OANDA_BASE_URL: https://api-fxtrade.oanda.com
          OANDA_API_KEY_DATA: ${{ secrets.OANDA_API_KEY_TRADING }}
          PYTHONIOENCODING: utf-8
        run: python -m scripts.fetch_historical

      - name: Run backtest battery
        working-directory: backend
        env:
          PYTHONIOENCODING: utf-8
        run: |
          QUARTER=$(date -u +%Y-Q%q || python -c "import datetime as d; n=d.datetime.utcnow(); print(f'{n.year}-Q{(n.month-1)//3+1}')")
          REPORT="../tasks/backtest_${QUARTER}.md"
          echo "Writing report to $REPORT"
          python -m scripts.backtest_v2 \
            --pair USD_CAD --pair USD_JPY \
            --walk-forward --ablate --monte-carlo 10000 \
            --report "$REPORT" \
            | tee /tmp/backtest_console.txt
          echo "REPORT_PATH=$REPORT" >> $GITHUB_ENV
          echo "QUARTER=$QUARTER" >> $GITHUB_ENV

      - name: Parse thresholds and decide labels
        id: verdict
        run: |
          REPORT="${{ env.REPORT_PATH }}"
          # Extract USD_CAD numbers from the markdown report
          CAD_PF=$(awk '/### USD_CAD/{flag=1;next} flag && /Profit factor:/{print $3; exit}' "$REPORT")
          CAD_SHARPE=$(awk '/### USD_CAD/{flag=1;next} flag && /Sharpe \(ann\):/{print $3; exit}' "$REPORT")
          CAD_MAR=$(awk '/### USD_CAD/{flag=1;next} flag && /Calmar \/ MAR:/{print $4; exit}' "$REPORT")
          JPY_PF=$(awk '/### USD_JPY/{flag=1;next} flag && /Profit factor:/{print $3; exit}' "$REPORT")

          echo "USD_CAD: PF=$CAD_PF Sharpe=$CAD_SHARPE MAR=$CAD_MAR"
          echo "USD_JPY: PF=$JPY_PF"

          LABELS=""
          ESCALATE=0
          # Live thresholds from PRD §3.4
          if awk -v v="$CAD_PF" 'BEGIN{exit !(v+0 < 1.5)}'; then
            LABELS="$LABELS,CRITICAL,backtest-regression"
            ESCALATE=1
          fi
          if awk -v v="$CAD_SHARPE" 'BEGIN{exit !(v+0 < 1.0)}'; then
            LABELS="$LABELS,CRITICAL,backtest-regression"
            ESCALATE=1
          fi
          if awk -v v="$CAD_MAR" 'BEGIN{exit !(v+0 < 0.5)}'; then
            LABELS="$LABELS,CRITICAL,backtest-regression"
            ESCALATE=1
          fi
          # JPY promotion candidate
          if awk -v v="$JPY_PF" 'BEGIN{exit !(v+0 >= 1.5)}'; then
            LABELS="$LABELS,jpy-ready-for-live"
          fi

          # Dedupe + strip leading comma
          LABELS=$(echo "$LABELS" | tr ',' '\n' | sort -u | grep -v '^$' | tr '\n' ',' | sed 's/,$//')
          [ -z "$LABELS" ] && LABELS="quarterly-backtest"

          echo "labels=$LABELS" >> $GITHUB_OUTPUT
          echo "escalate=$ESCALATE" >> $GITHUB_OUTPUT
          echo "cad_pf=$CAD_PF" >> $GITHUB_OUTPUT
          echo "cad_sharpe=$CAD_SHARPE" >> $GITHUB_OUTPUT
          echo "cad_mar=$CAD_MAR" >> $GITHUB_OUTPUT
          echo "jpy_pf=$JPY_PF" >> $GITHUB_OUTPUT

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="quarterly-backtest/${{ env.QUARTER }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add tasks/
          git commit \
            -m "[quarterly-backtest] ${{ env.QUARTER }} — results" \
            -m "USD_CAD: PF ${{ steps.verdict.outputs.cad_pf }}, Sharpe ${{ steps.verdict.outputs.cad_sharpe }}, MAR ${{ steps.verdict.outputs.cad_mar }}" \
            -m "USD_JPY: PF ${{ steps.verdict.outputs.jpy_pf }}" \
            -m "Live thresholds (PRD §3.4): PF >= 1.5, Sharpe >= 1.0, MAR >= 0.5" \
            -m "Co-Authored-By: github-actions <noreply@github.com>"
          git push -u origin "$BRANCH"

          ESCALATE_PREFIX=""
          if [ "${{ steps.verdict.outputs.escalate }}" = "1" ]; then
            ESCALATE_PREFIX="🔴 CRITICAL — "
          fi

          {
            echo "Auto-generated quarterly backtest report."
            echo ""
            echo "## USD_CAD (live-approved pair)"
            echo "- Profit factor: ${{ steps.verdict.outputs.cad_pf }} (threshold >= 1.5)"
            echo "- Sharpe (ann): ${{ steps.verdict.outputs.cad_sharpe }} (threshold >= 1.0)"
            echo "- Calmar / MAR: ${{ steps.verdict.outputs.cad_mar }} (threshold >= 0.5)"
            echo ""
            echo "## USD_JPY (paper-only)"
            echo "- Profit factor: ${{ steps.verdict.outputs.jpy_pf }} (promotion threshold >= 1.5)"
            echo ""
            echo "## Verdict"
            if [ "${{ steps.verdict.outputs.escalate }}" = "1" ]; then
              echo "🔴 **One or more USD_CAD thresholds breached.** Review immediately — consider pausing live mode until cause is identified."
            else
              echo "✅ USD_CAD live thresholds intact."
            fi
            echo ""
            echo "📄 Full report: \`${{ env.REPORT_PATH }}\`"
            echo ""
            echo "---"
            echo "Generated by \`.github/workflows/quarterly-backtest.yml\`"
          } > /tmp/pr_body.md

          gh pr create \
            --title "${ESCALATE_PREFIX}[quarterly-backtest] ${{ env.QUARTER }} results" \
            --body-file /tmp/pr_body.md \
            --label "${{ steps.verdict.outputs.labels }}" \
            --base main \
            --head "$BRANCH" || echo "PR creation failed (may already exist)"

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report-${{ env.QUARTER }}
          path: |
            ${{ env.REPORT_PATH }}
            /tmp/backtest_console.txt
