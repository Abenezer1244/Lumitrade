name: Post-Live Validation

# One-time scheduled job: 2026-05-16 14:00 UTC (3 weeks after the
# 2026-04-25 live cutover). Compares actual live USD_CAD trades against
# the 2-yr backtest predictions (PF 1.96, Sharpe 1.76, expectancy +$118.25).
#
# Outputs tasks/live_vs_backtest_<date>.md with one of three verdicts:
#   CONFIRMED  — live performance within 30% of backtest
#   DRIFTING   — live performance 30-50% off backtest
#   DIVERGED   — live PF below 0.7x backtest PF (escalates)
#
# Required repo secrets:
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#
# This file may also be triggered manually:
#   gh workflow run post-live-validation.yml
#
# After the May 16 run completes, feel free to delete this workflow or
# leave the cron (it will fire annually as a safety check).

on:
  schedule:
    - cron: '0 14 16 5 *'  # May 16 at 14:00 UTC
  workflow_dispatch:
    inputs:
      since_date:
        description: "ISO date to count trades from (default: 2026-04-25)"
        required: false
        default: "2026-04-25"

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Compare live to backtest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run live-vs-backtest comparison
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PYTHONIOENCODING: utf-8
          SINCE_DATE: ${{ github.event.inputs.since_date || '2026-04-25' }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          REPORT_ABS="$GITHUB_WORKSPACE/tasks/live_vs_backtest_${TODAY}.md"
          REPORT_REL="tasks/live_vs_backtest_${TODAY}.md"
          mkdir -p "$GITHUB_WORKSPACE/tasks/_artifacts"
          CONSOLE="$GITHUB_WORKSPACE/tasks/_artifacts/validation_console.txt"
          python -m scripts.compare_live_to_backtest \
            --since "$SINCE_DATE" \
            --pair USD_CAD \
            --bt-pf 1.96 --bt-sharpe 1.76 --bt-expectancy 118.25 \
            --bt-wr 0.543 --bt-source tasks/backtest_2026Q2_results.md \
            --report "$REPORT_ABS" | tee "$CONSOLE"
          echo "REPORT_PATH=$REPORT_REL" >> $GITHUB_ENV
          echo "REPORT_DATE=$TODAY" >> $GITHUB_ENV
          VERDICT=$(grep "^VERDICT:" "$CONSOLE" | tail -1 | cut -d: -f2- | xargs)
          echo "VERDICT=$VERDICT" >> $GITHUB_ENV

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create post-live-validation --color 1D76DB \
            --description "Live vs backtest comparison report" --force
          gh label create CRITICAL --color B60205 \
            --description "Requires immediate attention" --force
          gh label create verdict-confirmed --color 0E8A16 \
            --description "Live performance within 30% of backtest" --force
          gh label create verdict-drifting --color FBCA04 \
            --description "Live performance 30-50% off backtest" --force
          gh label create verdict-diverged --color B60205 \
            --description "Live performance below 0.7x backtest PF" --force

      - name: Open pull request with verdict
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="post-live-validation/${{ env.REPORT_DATE }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add tasks/live_vs_backtest_*.md
          git commit \
            -m "validation: live USD_CAD vs backtest predictions (${{ env.REPORT_DATE }})" \
            -m "Verdict: ${{ env.VERDICT }}" \
            -m "Co-Authored-By: github-actions <noreply@github.com>"
          git push -u origin "$BRANCH"

          LABEL="post-live-validation"
          PREFIX=""
          case "${{ env.VERDICT }}" in
            CONFIRMED) LABEL="$LABEL,verdict-confirmed" ;;
            DRIFTING) LABEL="$LABEL,verdict-drifting" ;;
            DIVERGED) LABEL="$LABEL,CRITICAL,verdict-diverged"; PREFIX="🔴 CRITICAL — " ;;
            *) LABEL="$LABEL,verdict-unknown" ;;
          esac

          {
            echo "Compares live USD_CAD trades since 2026-04-25 against backtest predictions"
            echo "from \`tasks/backtest_2026Q2_results.md\` (PF 1.96, Sharpe 1.76, expectancy +\$118.25/trade)."
            echo ""
            echo "**Verdict:** \`${{ env.VERDICT }}\`"
            echo ""
            echo "📄 Full report: \`${{ env.REPORT_PATH }}\`"
            echo ""
            echo "---"
            echo "Generated by \`.github/workflows/post-live-validation.yml\`"
          } > /tmp/pr_body.md

          if ! gh pr create \
              --title "${PREFIX}[post-live-validation] ${{ env.REPORT_DATE }} — ${{ env.VERDICT }}" \
              --body-file /tmp/pr_body.md \
              --label "$LABEL" \
              --base main \
              --head "$BRANCH"; then
            EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' || echo "")
            if [ -n "$EXISTING" ]; then
              echo "PR #$EXISTING already exists for $BRANCH — updating body"
              gh pr edit "$EXISTING" --body-file /tmp/pr_body.md
            else
              echo "::error::gh pr create failed and no existing PR found"
              exit 1
            fi
          fi

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-vs-backtest-${{ env.REPORT_DATE }}
          path: |
            tasks/live_vs_backtest_*.md
            tasks/_artifacts/validation_console.txt
