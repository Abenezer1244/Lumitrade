name: Test Suite

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, staging]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff (advisory)
        # TODO(post-cutover): drop --exit-zero once 386-violation lint debt is cleared.
        # 4 of those are PEP 701 f-string nested quotes that need pyproject.toml
        # target-version bump py311 -> py312 (project actually runs on 3.12).
        run: ruff check lumitrade/ tests/ --exit-zero

      - name: Type check with mypy (advisory)
        # TODO(post-cutover): unwrap || true once mypy strict mode debt is cleared.
        run: mypy lumitrade/ --ignore-missing-imports || true

      - name: Run tests with coverage
        run: |
          pytest tests/unit/ tests/chaos/ tests/integration/ tests/security/ tests/performance/ -v \
            --cov=lumitrade \
            --cov-report=term-missing \
            --cov-fail-under=75
        env:
          OANDA_API_KEY_DATA: test_key_data
          OANDA_API_KEY_TRADING: test_key_trading
          OANDA_ACCOUNT_ID: test_account
          OANDA_ENVIRONMENT: practice
          ANTHROPIC_API_KEY: test_key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: test_service_key
          TELNYX_API_KEY: test_telnyx_key
          TELNYX_FROM_NUMBER: "+10000000000"
          ALERT_SMS_TO: "+10000000001"
          SENDGRID_API_KEY: test_sg_key
          ALERT_EMAIL_TO: test@test.com
          INSTANCE_ID: ci-test
          TRADING_MODE: PAPER

      - name: Secrets scan (gitleaks)
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint (advisory)
        # `next lint` was removed in Next.js 15+. Project is on Next 16. Run
        # eslint directly until package.json scripts are migrated.
        # TODO(post-cutover): migrate "lint" script + drop || true.
        run: npx eslint . --ext .ts,.tsx --max-warnings 9999 || true

      - name: Build check
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test_anon_key
