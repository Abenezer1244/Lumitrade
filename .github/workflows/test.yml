name: Test Suite

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, staging]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check lumitrade/ tests/

      - name: Type check with mypy
        run: mypy lumitrade/ --ignore-missing-imports || echo "::warning::mypy found type errors (non-blocking)"
        continue-on-error: true

      - name: Run unit tests
        run: |
          pytest tests/unit/ tests/chaos/ tests/integration/ tests/security/ -v \
            --cov=lumitrade \
            --cov-report=term-missing \
            --cov-fail-under=75
        env:
          OANDA_API_KEY_DATA: test_key_data
          OANDA_API_KEY_TRADING: test_key_trading
          OANDA_ACCOUNT_ID: test_account
          OANDA_ENVIRONMENT: practice
          ANTHROPIC_API_KEY: test_key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: test_service_key
          TELNYX_API_KEY: test_telnyx_key
          TELNYX_FROM_NUMBER: "+10000000000"
          ALERT_SMS_TO: "+10000000001"
          SENDGRID_API_KEY: test_sg_key
          ALERT_EMAIL_TO: test@test.com
          INSTANCE_ID: ci-test
          TRADING_MODE: PAPER

      - name: Secrets scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build check
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test_anon_key
